Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 10
MinSpareServers 1
MaxSpareServers 5
StartServers 2
DisableViaHeader Yes

# Basic auth — CapSolver must supply these credentials to use the proxy.
# The password here must match CAPSOLVER_PROXY in .env.
# Change this before deploying — do not leave the placeholder.
BasicAuth capsolver CHANGE_THIS_PASSWORD
